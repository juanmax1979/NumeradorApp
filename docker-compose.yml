services:
  backend:
    build:
      context: ./backend
    container_name: numerador-backend
    env_file:
      - ./backend/.env
    ports:
      - "4000:4000"
    restart: unless-stopped
    networks:
      - numerador-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: numerador-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - numerador-network

  integracion:
    build:
      context: ./integracion-numerador
    container_name: numerador-integracion
    depends_on:
      - backend
    ports:
      - "5174:5174"
    restart: unless-stopped
    networks:
      - numerador-network

networks:
  numerador-network:
    driver: bridge
